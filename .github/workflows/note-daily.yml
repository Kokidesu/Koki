name: note daily auto-post

# PCを開いていなくても GitHub のクラウド上で動きます。
# Runs on GitHub's cloud — your PC does NOT need to be on.
#
# 必要なSecretsをこのリポジトリのSettings → Secrets and variables → Actions に登録:
#   GEMINI_API_KEY      … Google AI Studio のAPIキー
#   NOTE_STORAGE_STATE  … tools/export_note_session.py で作った storage_state.json の中身（まるごと貼り付け）
#
# cron はUTC。日本時間(JST)に直すと下記の通り（1日3回・間隔をあけてスパム判定を避ける）。

on:
  schedule:
    - cron: "0 0 * * *"   # 09:00 JST
    - cron: "0 4 * * *"   # 13:00 JST
    - cron: "0 10 * * *"  # 19:00 JST
  workflow_dispatch: {}   # 手動実行ボタンも用意 / manual run button

concurrency:
  group: note-auto-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/note-auto-poster
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Restore note login session
        run: |
          printf '%s' "$NOTE_STORAGE_STATE" > storage_state.json
        env:
          NOTE_STORAGE_STATE: ${{ secrets.NOTE_STORAGE_STATE }}

      - name: Generate & post
        run: python run_daily.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # noteログイン: 下記のいずれかを設定（Googleログインの人は NOTE_COOKIES_JSON）
          NOTE_COOKIES_JSON: ${{ secrets.NOTE_COOKIES_JSON }}
          NOTE_EMAIL: ${{ secrets.NOTE_EMAIL }}
          NOTE_PASSWORD: ${{ secrets.NOTE_PASSWORD }}
