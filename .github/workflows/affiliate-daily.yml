name: affiliate-daily

# 毎日、新しい記事を生成して content/ に積み上げ、GitHub Pages へ公開する。
# 事前準備:
#   1) Settings → Secrets and variables → Actions
#        Secrets: ANTHROPIC_API_KEY (必須)
#        Variables: SITE_URL, AMAZON_TAG (任意)
#   2) Settings → Pages → Source = "GitHub Actions"
#   3) このワークフローはデフォルトブランチ(main)に置くとスケジュール実行されます。
on:
  schedule:
    - cron: "0 22 * * *" # 毎日 07:00 JST (= 22:00 UTC)
  workflow_dispatch:
    inputs:
      count:
        description: "今回増やす記事数"
        default: "5"

permissions:
  contents: write # content/ の追記コミット用
  pages: write
  id-token: write

concurrency:
  group: affiliate-pages
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: projects/koki-affiliate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: pip install -e ".[llm]"

      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          affiliate run \
            --seeds-file seeds.txt \
            --count "${{ github.event.inputs.count || '5' }}" \
            --out docs \
            --content content \
            --site-url "${{ vars.SITE_URL }}" \
            --amazon-tag "${{ vars.AMAZON_TAG }}"

      - name: Commit accumulated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content
          git diff --cached --quiet || git commit -m "auto: 記事を追加"
          git push

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: projects/koki-affiliate/docs

      - id: deployment
        uses: actions/deploy-pages@v4
