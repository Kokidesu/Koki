name: Deploy Case Interview App to GitHub Pages

# projects/case-interview/ を GitHub Pages に公開する。
# Pages のソースが未設定でも、configure-pages の enablement:true が初回に自動で有効化する。
# 公開URL: https://<owner>.github.io/<repo>/  （このリポジトリなら https://kokidesu.github.io/koki/ ）

on:
  push:
    branches: [ "main" ]
    paths:
      - "projects/case-interview/**"
      - ".github/workflows/deploy-case-interview.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに絞る（進行中をキャンセルしない）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/case-interview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
